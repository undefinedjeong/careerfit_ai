<!DOCTYPE html>
    <head>
        <title>CareerFit AI</title>
        <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-light.min.css">
    </head>

    <body>
        <div>
            <span>
                <h1 style="text-align: center;">CareerFit AI</h1>
            </span>
            
            <p style="text-align: center;">
                2026학년도 여름계절학기 인공지능 에이전트 개발반
                <br>
                컴퓨터과학부 2025920046 정경훈
            </p>
        </div>
        <div style="width: 45%; max-width: 1000px; min-width: 600px; margin: 16px auto;">
            <a href="https://github.com/undefinedjeong/careerfit_ai/">
                <img src="img/github.png" style="width:32px; margin: 16px;", href="https://github.com/undefinedjeong/careerfit_ai/">
            </a>
            <details id="content" class="markdown-body readme-details">
                <summary>README.md</summary>
            </details>
        </div>
    </body>

    <script>
        fetch("README.md")
        .then(response => response.text())
        .then(text => {
            document.getElementById("content").innerHTML = marked.parse(text);
        });
    </script>

    <style>
        .readme-details {
            padding: 24px 32px;
            border-radius: 18px;
            box-shadow: 0 5px 30px rgba(0,0,0,0.08);
            border: 1px solid #e0e0e0;
        }
    </style>
</html>
